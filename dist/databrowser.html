<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>SolidOS</title><script>document.addEventListener('DOMContentLoaded', function() {
        panes.runDataBrowser()

        var header = document.getElementById('mainSolidUiHeader')
        if (!header) return

        var syncHeaderHeight = function () {
          var height = header.getBoundingClientRect().height
          if (height > 0) {
            var rootFontSize = parseFloat(
              getComputedStyle(document.documentElement).fontSize
            )
            document.documentElement.style.setProperty(
              '--app-header-height',
              (height / rootFontSize) + 'rem'
            )
          }
        }

        syncHeaderHeight()
        if ('ResizeObserver' in window) {
          new ResizeObserver(syncHeaderHeight).observe(header)
        } else {
          window.addEventListener('resize', syncHeaderHeight)
        }
      })</script><script defer="defer" src="/mashlib/dist/mashlib.min.js"></script><link href="/mashlib/dist/mash.css" rel="stylesheet"></head><body id="PageBody" data-app-shell="databrowser"><a href="#MainContent" class="skip-link">Skip to main content</a><solid-ui-header id="mainSolidUiHeader" theme="" layout="" brand-link="/"><span slot="title"></span></solid-ui-header><div class="app-main" tabindex="-1" aria-live="polite"><div class="app-shell"><aside id="NavMenu" class="app-nav" aria-label="Application menu" hidden><div id="NavMenuContent" class="menu-content"></div></aside><main id="MainContent" class="app-view"><table id="OutlineView" class="outline-view" aria-label="Resource browser"></table><section id="GlobalDashboard" class="global-dashboard" aria-label="Dashboard" hidden></section></main></div><div id="MenuOverlay" class="menu-overlay" hidden aria-hidden="true"></div></div><footer id="PageFooter" role="contentinfo"></footer></body></html>
